{% extends "base.html" %}
{% block title %}Delete event{% endblock %}
{% block page_title %}Delete event{% endblock %}

{% block content %}
<div class="panel">
    <p>Delete event <strong>{{ object.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <a href="{% url 'planning:list' %}" class="btn btn-ghost">Cancel</a>
            <button type="submit" class="btn btn-danger">Yes, delete</button>
        </div>
    </form>
</div>
{% endblock %}
